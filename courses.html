<section class="hero--compact hero"><div class="container">
<h1>Наши курсы</h1>
<p>Подберите подходящий курс по уровню, материалу и продолжительности. Все занятия предзаписаны, поэтому вы можете учиться в удобное время.</p>
</div></section>
<section class="path-finder">
<h2>Фильтр</h2>
<form class="path-form" onsubmit="return false;">
<div>
<label for="course-level-select">Уровень:</label>
<select id="course-level-select">
<option value="Any">Любой</option>
<option value="beginner">Новичок</option>
<option value="intermediate">Средний</option>
<option value="advanced">Продвинутый</option>
</select>
</div>
<div>
<label for="course-medium-select">Материал:</label>
<select id="course-medium-select">
<option value="Any">Любой</option>
<option value="Watercolor">Акварель</option>
<option value="Pastel">Пастель</option>
<option value="Digital">Цифровой</option>
</select>
</div>
<div>
<label for="course-time-select">Время на картину:</label>
<select id="course-time-select">
<option value="Any">Любое</option>
<option value="1-2">1–2 часа</option>
<option value="3+">3+ часа</option>
</select>
</div>
</form>
<div class="suggestions" id="courseList"></div>
</section>
